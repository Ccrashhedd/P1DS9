<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/index.css">
    <title>ElvisTech</title>
</head>
<body>
    <header class="header">
        <div class="headCont">
            <div id="empNomb">
                <img alt="Logo">
                <h1>ElvisTech</h1>
                <p>Igualito que en la imagen</p>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="mainCont">  

            <section class="busquedaCont">

                <div class="filtroCont">
                    <!--Filtros para busqueda precisa-->
                    <details>
                        <summary>Hola</summary>
                            hola
                        
                    </details>

                </div>

                <div class="catalogoCont">
                    <!--Table para hacer el catalogo de los productos-->
                    <table id="catalogo">
                        <thead id="catHead">
                            <!--Espacio en blanco por cualquier cosa-->
                        </thead>
                        <tbody id="catBody">
                            <!--Aqui se llena el catalogo con los productos-->
                        </tbody>
                        <tfoot id="catFoot">
                            <!--Espacio en blanco por cualquier cosa-->
                        </tfoot>
                    </table>
                </div>

            </section>


        </div>
    </main>

    <footer class="footer">
        <div class="footCont">

        </div>
    </footer>
</body>
</html>
